server:
  port: 8080

spring:
  application:
    name: docuquery-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/docuquery_db
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 10MB

jwt:
  secret: your-256-bit-secret-key-here-make-it-long
  expiration: 86400000 # 24 hours

file:
  upload-dir: uploads/documents

gemini:
  api-key: AIzaSyC2Jmp8ArfJ8Lq8KTEw7g5qIeK6R-22PNY
